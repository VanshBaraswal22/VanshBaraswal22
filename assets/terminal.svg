<svg width="820" height="300" viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="winGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#12162e"/>
      <stop offset="100%" stop-color="#080a1a"/>
    </linearGradient>
    <filter id="termGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="10" y="10" width="800" height="280" rx="14" fill="url(#winGrad)" stroke="#2a3166" stroke-width="1.5"/>

  <!-- title bar -->
  <rect x="10" y="10" width="800" height="36" rx="14" fill="#141a3d"/>
  <rect x="10" y="32" width="800" height="14" fill="#141a3d"/>
  <circle cx="34" cy="28" r="6" fill="#ff5f56"/>
  <circle cx="56" cy="28" r="6" fill="#ffbd2e"/>
  <circle cx="78" cy="28" r="6" fill="#27c93f"/>
  <text x="410" y="33" font-family="Consolas, monospace" font-size="13" fill="#6f7bb3" text-anchor="middle">vansh@portfolio: ~</text>

  <!-- terminal body text, monospace, staggered fade/typing -->
  <g font-family="Consolas, 'Courier New', monospace" font-size="17">

    <text x="34" y="85" fill="#00fff2" opacity="0">
      $ whoami
      <animate attributeName="opacity" values="0;1;1" keyTimes="0;0.05;1" dur="10s" repeatCount="indefinite"/>
    </text>

    <text x="34" y="115" fill="#f5f5ff" opacity="0">
      &gt;&gt; Vansh Baraswal — B.Tech IT, HBTU Kanpur
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.08;0.14;1" dur="10s" repeatCount="indefinite"/>
    </text>

    <text x="34" y="150" fill="#00fff2" opacity="0">
      $ cat skills.json
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.22;0.28;1" dur="10s" repeatCount="indefinite"/>
    </text>

    <text x="34" y="180" fill="#ff2bd6" opacity="0">
      [ "Python", "React", "Node.js", "MongoDB", "Django", "DSA" ]
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.36;0.42;1" dur="10s" repeatCount="indefinite"/>
    </text>

    <text x="34" y="215" fill="#00fff2" opacity="0">
      $ ./run_dsa_tracker.sh
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.5;0.56;1" dur="10s" repeatCount="indefinite"/>
    </text>

    <text x="34" y="245" fill="#9d4edd" opacity="0" filter="url(#termGlow)">
      ✓ 350+ DSA problems solved and counting...
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.64;0.7;1" dur="10s" repeatCount="indefinite"/>
    </text>

    <text x="34" y="275" fill="#00fff2" opacity="0">
      $ echo "Let's build something great."_
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.8;0.86;1" dur="10s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- blinking cursor -->
  <rect x="380" y="260" width="10" height="18" fill="#00fff2">
    <animate attributeName="opacity" values="1;1;0;0" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
