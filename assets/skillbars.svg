<svg width="820" height="380" viewBox="0 0 820 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00fff2"/>
      <stop offset="100%" stop-color="#ff2bd6"/>
    </linearGradient>
    <filter id="barGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="820" height="380" fill="#05010d" rx="16"/>

  <text x="30" y="42" font-family="Consolas, monospace" font-size="20" fill="#00fff2" letter-spacing="1">// SKILL MATRIX</text>

  <g font-family="'Segoe UI', sans-serif" font-size="16" fill="#f5f5ff">

    <!-- Python 90% -->
    <text x="30" y="85">Python</text>
    <rect x="230" y="70" width="560" height="16" rx="8" fill="#141a3d"/>
    <rect x="230" y="70" height="16" rx="8" fill="url(#barGrad)" filter="url(#barGlow)">
      <animate attributeName="width" values="0;504" dur="2s" fill="freeze"/>
    </rect>
    <text x="800" y="83" font-size="13" fill="#8be9fd" text-anchor="end">90%</text>

    <!-- React.js 85% -->
    <text x="30" y="125">React.js</text>
    <rect x="230" y="110" width="560" height="16" rx="8" fill="#141a3d"/>
    <rect x="230" y="110" height="16" rx="8" fill="url(#barGrad)" filter="url(#barGlow)">
      <animate attributeName="width" values="0;476" dur="2s" fill="freeze"/>
    </rect>
    <text x="800" y="123" font-size="13" fill="#8be9fd" text-anchor="end">85%</text>

    <!-- Node.js / Express 80% -->
    <text x="30" y="165">Node.js / Express</text>
    <rect x="230" y="150" width="560" height="16" rx="8" fill="#141a3d"/>
    <rect x="230" y="150" height="16" rx="8" fill="url(#barGrad)" filter="url(#barGlow)">
      <animate attributeName="width" values="0;448" dur="2s" fill="freeze"/>
    </rect>
    <text x="800" y="163" font-size="13" fill="#8be9fd" text-anchor="end">80%</text>

    <!-- MongoDB 78% -->
    <text x="30" y="205">MongoDB</text>
    <rect x="230" y="190" width="560" height="16" rx="8" fill="#141a3d"/>
    <rect x="230" y="190" height="16" rx="8" fill="url(#barGrad)" filter="url(#barGlow)">
      <animate attributeName="width" values="0;437" dur="2s" fill="freeze"/>
    </rect>
    <text x="800" y="203" font-size="13" fill="#8be9fd" text-anchor="end">78%</text>

    <!-- Django 75% -->
    <text x="30" y="245">Django</text>
    <rect x="230" y="230" width="560" height="16" rx="8" fill="#141a3d"/>
    <rect x="230" y="230" height="16" rx="8" fill="url(#barGrad)" filter="url(#barGlow)">
      <animate attributeName="width" values="0;420" dur="2s" fill="freeze"/>
    </rect>
    <text x="800" y="243" font-size="13" fill="#8be9fd" text-anchor="end">75%</text>

    <!-- DSA 85% -->
    <text x="30" y="285">DSA (350+ solved)</text>
    <rect x="230" y="270" width="560" height="16" rx="8" fill="#141a3d"/>
    <rect x="230" y="270" height="16" rx="8" fill="url(#barGrad)" filter="url(#barGlow)">
      <animate attributeName="width" values="0;476" dur="2s" fill="freeze"/>
    </rect>
    <text x="800" y="283" font-size="13" fill="#8be9fd" text-anchor="end">85%</text>

    <!-- Machine Learning 60% -->
    <text x="30" y="325">Machine Learning</text>
    <rect x="230" y="310" width="560" height="16" rx="8" fill="#141a3d"/>
    <rect x="230" y="310" height="16" rx="8" fill="url(#barGrad)" filter="url(#barGlow)">
      <animate attributeName="width" values="0;336" dur="2s" fill="freeze"/>
    </rect>
    <text x="800" y="323" font-size="13" fill="#8be9fd" text-anchor="end">60%</text>

  </g>
</svg>
